<!DOCTYPE html>

<html class="light" lang="uz"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kirish | The Editorial Pulse Admin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Work+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        .label-text {
            font-family: 'Work Sans', sans-serif;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#d5e3ff",
                        "outline": "#727782",
                        "error": "#ba1a1a",
                        "surface-tint": "#255fa5",
                        "primary": "#003569",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed-variant": "#763300",
                        "on-secondary-fixed-variant": "#364763",
                        "inverse-primary": "#a7c8ff",
                        "surface-container-low": "#f3f4f5",
                        "on-secondary-fixed": "#071c35",
                        "on-background": "#191c1d",
                        "tertiary-fixed": "#ffdbca",
                        "outline-variant": "#c2c6d2",
                        "on-primary-fixed": "#001c3b",
                        "inverse-surface": "#2e3132",
                        "surface-dim": "#d9dadb",
                        "on-tertiary-fixed": "#331200",
                        "primary-container": "#004c91",
                        "on-secondary": "#ffffff",
                        "tertiary-container": "#7f3700",
                        "surface-container-lowest": "#ffffff",
                        "secondary": "#4e5f7c",
                        "on-primary-container": "#96beff",
                        "inverse-on-surface": "#f0f1f2",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed": "#d5e3ff",
                        "on-tertiary-container": "#ffa877",
                        "on-surface": "#191c1d",
                        "secondary-fixed-dim": "#b5c7e9",
                        "on-error-container": "#93000a",
                        "surface-variant": "#e1e3e4",
                        "surface-container": "#edeeef",
                        "surface-bright": "#f8f9fa",
                        "on-surface-variant": "#424751",
                        "on-secondary-container": "#4e607d",
                        "tertiary": "#5c2600",
                        "error-container": "#ffdad6",
                        "secondary-container": "#c9dbfd",
                        "background": "#f8f9fa",
                        "surface-container-high": "#e7e8e9",
                        "on-primary": "#ffffff",
                        "on-primary-fixed-variant": "#004788",
                        "tertiary-fixed-dim": "#ffb68e",
                        "primary-fixed-dim": "#a7c8ff",
                        "surface-container-highest": "#e1e3e4",
                        "surface": "#f8f9fa"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Work Sans"]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center overflow-hidden relative">
<!-- Background Layer with subtle News Overlay -->
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-br from-surface to-surface-container opacity-90 z-10"></div>
<img alt="Newspaper texture" class="w-full h-full object-cover grayscale opacity-10" data-alt="high-angle shot of stacks of newspapers and digital tablets on a wooden desk with soft natural morning light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCNm0aahUeSc2xYhvGu09iGCZN06JHrQTFLLEA1jLUsqJU7skk8QBvIi64xiun8Mv_FPo53K7NLrc-rHKD5kGEWSWmrj3lzn3CbCyjPDsny9SPZq8Lm0NCNKCwGFLXOGXy8Nf0y2XlCJtfJXvP1Yj4lF7nvjII4g1iRc-wBWSNNY26nkxvbJaTfcLQsqaZsYQXfZ_Dxyln6TRCdSBHvMGquSq5UzzKO-_XWNo7o-f_Ifdixlr4rEEtASht22ExZXKvssWVrinAUXJxq"/>
</div>
<!-- Login Container -->
<main class="relative z-20 w-full max-w-md px-6">
<!-- Branding Header -->
<div class="mb-12 text-center">
<div class="inline-flex items-center justify-center bg-primary-container p-3 rounded-xl mb-4">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="article">article</span>
</div>
<h1 class="text-3xl font-black tracking-tighter text-primary">The Editorial Pulse</h1>
<p class="label-text text-on-surface-variant font-medium mt-2">Curator Suite v2.4</p>
</div>
<!-- Centralized Login Card -->
<section class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/10 p-8 backdrop-blur-sm">
<header class="mb-8">
<h2 class="text-xl font-bold text-on-surface tracking-tight">Admin tizimiga kirish</h2>
<p class="text-on-surface-variant text-sm mt-1">Daryo tahririyat boshqaruv markaziga kirish</p>
</header>
<form action="#" class="space-y-6" method="POST">
<!-- Username/Email Field -->
<div class="space-y-2">
<label class="label-text text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="identifier">Email yoki foydalanuvchi nomi</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="alternate_email">alternate_email</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline transition-all" id="identifier" name="identifier" placeholder="editor@editorialpulse.com" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="label-text text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="password">Parol</label>
<a class="label-text text-xs text-primary font-semibold hover:underline" href="#">Parolni unutdingizmi?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-3">
<input class="w-4 h-4 rounded-sm border-outline-variant text-primary focus:ring-primary" id="remember" name="remember" type="checkbox"/>
<label class="text-sm text-on-surface-variant font-medium" for="remember">Meni 30 kun davomida tizimda qoldir</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary py-4 rounded-lg font-bold tracking-tight shadow-md hover:shadow-lg transition-all active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
<span>Boshqaruv paneliga kirish</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Help Link -->
<footer class="mt-8 pt-6 border-t border-surface-container text-center">
<p class="text-sm text-on-surface-variant">
                    Ichki tizim. Yordam kerakmi? 
                    <a class="text-primary font-semibold hover:underline" href="#">Texnik yordam bilan bog'lanish</a>
</p>
</footer>
</section>
<!-- Dynamic Information Footer -->
<div class="mt-12 flex justify-between items-center text-on-surface-variant/60">
<div class="flex items-center gap-4">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-xs" data-icon="public">public</span>
<span class="label-text text-[10px] font-bold uppercase tracking-tighter">Global kirish</span>
</div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-xs" data-icon="security">security</span>
<span class="label-text text-[10px] font-bold uppercase tracking-tighter">Himoyalangan seans</span>
</div>
</div>
<span class="label-text text-[10px] font-bold uppercase tracking-tighter">© 2024 Daryo Editorial</span>
</div>
</main>
<!-- Side Language Toggle (Floating Glassmorphism) -->
<nav class="fixed top-8 right-8 z-50 flex gap-2 p-1.5 bg-surface/80 backdrop-blur-xl rounded-full border border-outline-variant/10 shadow-sm">
<button class="px-4 py-1.5 rounded-full text-xs font-bold text-on-surface-variant hover:bg-surface-container-low label-text">EN</button>
<button class="px-4 py-1.5 rounded-full text-xs font-bold bg-primary-container text-on-primary label-text">UZ</button>
<button class="px-4 py-1.5 rounded-full text-xs font-bold text-on-surface-variant hover:bg-surface-container-low label-text">RU</button>
</nav>
</body></html>
